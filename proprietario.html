<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Area Proprietario — Ristorante Georgiano</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #1a2a5e; --accent: #e8601c;
      --bg: #f0f4fa; --card: #fff; --border: #d0d8ea; --muted: #6b7a99;
    }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; color: var(--dark); min-height: 100vh; }

    /* panel */
    #panel { max-width: 780px; margin: 0 auto; padding: 36px 24px 80px; }

    .panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:10px; }
    .panel-header h1 { font-size:1.4rem; font-weight:800; }
    .badge { background:#fff4e5; color:#b05800; border:1px solid #f0c070; border-radius:20px; padding:3px 10px; font-size:.72rem; font-weight:700; }
    .btn-home { padding:8px 20px; border:1.5px solid var(--border); border-radius:10px; background:var(--card); font-size:.87rem; font-weight:600; color:var(--muted); text-decoration:none; transition:color .15s,border-color .15s; }
    .btn-home:hover { color:var(--dark); border-color:var(--dark); }

    /* db status */
    .db-status { padding:10px 16px; border-radius:10px; font-size:.84rem; font-weight:600; margin-bottom:20px; }
    .db-status.loading { background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe; }
    .db-status.ok      { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }
    .db-status.err     { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }

    /* tabs */
    .tabs { display:flex; gap:4px; background:var(--card); border-radius:13px; padding:5px; margin-bottom:20px; border:1.5px solid var(--border); }
    .tab-btn { flex:1; padding:10px 14px; border:none; border-radius:9px; font-size:.9rem; font-weight:700; cursor:pointer; color:var(--muted); background:transparent; transition:all .2s; }
    .tab-btn.active { background:var(--dark); color:#fff; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* card */
    .card { background:var(--card); border-radius:16px; padding:24px 28px; margin-bottom:18px; border:1.5px solid var(--border); }
    .card-title { font-size:.78rem; font-weight:800; color:var(--dark); text-transform:uppercase; letter-spacing:.8px; margin-bottom:18px; }

    /* add row */
    .add-row { display:flex; gap:10px; flex-wrap:wrap; }
    .add-row input, .add-row select { flex:1; min-width:130px; padding:12px 14px; border:1.5px solid var(--border); border-radius:11px; font-size:.94rem; color:var(--dark); background:#fff; outline:none; transition:border-color .2s; appearance:auto; }
    .add-row input:focus, .add-row select:focus { border-color:var(--dark); }
    .btn-add { padding:12px 20px; background:var(--dark); color:#fff; border:none; border-radius:11px; font-size:.9rem; font-weight:700; cursor:pointer; white-space:nowrap; transition:background .2s; }
    .btn-add:hover { background:var(--accent); }
    .add-error { font-size:.8rem; color:#c0392b; font-weight:600; margin-top:8px; display:none; }

    /* date list */
    .date-item { display:flex; align-items:center; justify-content:space-between; padding:12px 15px; background:var(--bg); border-radius:10px; margin-bottom:8px; font-size:.9rem; }
    .date-item span { font-weight:600; }
    .date-item em { font-weight:400; color:var(--muted); }
    .btn-remove { background:none; border:none; color:#c0392b; font-size:1.1rem; cursor:pointer; padding:4px 10px; border-radius:7px; }
    .btn-remove:hover { background:#fdecea; }

    .status-bar { font-size:.82rem; color:var(--muted); margin-top:10px; min-height:18px; text-align:center; }
    .status-bar.ok  { color:#16a34a; font-weight:700; }
    .status-bar.err { color:#c0392b; font-weight:700; }

    /* bookings */
    .bookings-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
    .count-badge { background:var(--dark); color:#fff; border-radius:20px; padding:3px 10px; font-size:.75rem; font-weight:700; }
    .btn-refresh { padding:7px 14px; border:1.5px solid var(--border); border-radius:9px; background:#fff; font-size:.82rem; font-weight:600; color:var(--muted); cursor:pointer; }
    .btn-refresh:hover { color:var(--dark); border-color:var(--dark); }

    .booking-item { border:1.5px solid var(--border); border-radius:13px; padding:15px 18px; margin-bottom:10px; background:#fff; }
    .b-name { font-size:.98rem; font-weight:800; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
    .b-tag { background:#eff6ff; color:#1d4ed8; border-radius:6px; padding:2px 8px; font-size:.73rem; font-weight:700; }
    .b-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; }
    .b-meta { font-size:.82rem; color:var(--muted); }
    .b-meta strong { color:var(--dark); }
    .b-time { grid-column:1/-1; font-size:.73rem; color:#aaa; margin-top:4px; }
    .empty-msg { text-align:center; color:var(--muted); font-size:.9rem; padding:20px 0; }

    @media (max-width:560px) {
      .card { padding:18px 16px; }
      #panel { padding:24px 14px 60px; }
      .b-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<div id="panel">
  <div class="panel-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <img src="0WOSX000000ut3e4AA_logo-ce6f817f-1920w.webp" alt="Logo" style="height:36px;width:auto;object-fit:contain;">
      <h1>Dashboard</h1>
    </div>
    <a href="index.html" class="btn-home">← Prenotazioni</a>
  </div>

  <!-- Stato database -->
  <div class="db-status loading" id="db-status">⏳ Connessione al database in corso…</div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('prenotazioni')">📋 Prenotazioni</button>
    <button class="tab-btn" onclick="switchTab('date')">🔒 Date Bloccate</button>
  </div>

  <!-- TAB PRENOTAZIONI -->
  <div class="tab-panel active" id="tab-prenotazioni">
    <div class="card">
      <div class="bookings-top">
        <p class="card-title" style="margin-bottom:0">Prenotazioni ricevute</p>
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="count-badge" id="booking-count">0</span>
          <button class="btn-refresh" onclick="loadAll()">↻ Aggiorna</button>
        </div>
      </div>
      <div id="booking-list"><p class="empty-msg">Caricamento…</p></div>
    </div>
  </div>

  <!-- TAB DATE BLOCCATE -->
  <div class="tab-panel" id="tab-date">
    <div class="card">
      <p class="card-title">Blocca una data</p>
      <div class="add-row">
        <input type="date" id="new-date">
        <select id="new-service">
          <option value="all">Tutto il giorno</option>
          <option value="lunch">Solo pranzo</option>
          <option value="dinner">Solo cena</option>
        </select>
        <button class="btn-add" onclick="addDate()">+ Blocca</button>
      </div>
      <p class="add-error" id="add-error"></p>
    </div>
    <div class="card">
      <p class="card-title">Date bloccate</p>
      <div id="date-list"><p class="empty-msg">Caricamento…</p></div>
      <p class="status-bar" id="date-status"></p>
    </div>
  </div>
</div>

<script>
var PASSWORD = 'georgiano';
if (sessionStorage.getItem('owner-auth') !== '1') {
  var pwd = prompt('Password area proprietario:');
  if (pwd !== PASSWORD) {
    document.body.innerHTML = '<p style="font-family:sans-serif;text-align:center;margin-top:20vh;font-size:1.1rem;color:#c0392b;">Accesso negato.</p>';
    throw new Error('Accesso negato');
  }
  sessionStorage.setItem('owner-auth', '1');
}

var BIN_ID  = '6a3141b9da38895dfec96c55';
var API_KEY = '$2a$10$zBwelpwQgG216q.q8YasGeJxALIxr1LJm/E9Lk9HhkIlr3uVXtmaK';
var blocked  = [];
var bookings = [];

var SVC = { all:'Tutto il giorno', lunch:'Solo pranzo', dinner:'Solo cena' };

// Data minima
// Nessun limite: il proprietario può bloccare qualsiasi data inclusa oggi

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b,i) {
    b.classList.toggle('active', ['prenotazioni','date'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
}

function setDbStatus(type, msg) {
  var el = document.getElementById('db-status');
  el.className = 'db-status ' + type;
  el.textContent = msg;
}

function loadAll() {
  setDbStatus('loading', '⏳ Connessione al database…');
  fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
    headers: { 'X-Master-Key': API_KEY }
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(d) {
    if (!d.record) throw new Error('Record vuoto');
    blocked  = Array.isArray(d.record.blocked)  ? d.record.blocked  : [];
    bookings = Array.isArray(d.record.bookings) ? d.record.bookings : [];
    setDbStatus('ok', '✅ Database connesso — ' + bookings.length + ' prenotazioni, ' + blocked.length + ' date bloccate');
    renderDates();
    renderBookings();
  })
  .catch(function(e) {
    setDbStatus('err', '❌ Errore database: ' + e.message + ' — controlla che il BIN ID e l\'API key siano corretti');
    document.getElementById('booking-list').innerHTML = '<p class="empty-msg">Impossibile caricare i dati.</p>';
    document.getElementById('date-list').innerHTML    = '<p class="empty-msg">Impossibile caricare i dati.</p>';
  });
}

function saveBlocked() {
  setDateStatus('Salvataggio…', '');
  fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
    headers: { 'X-Master-Key': API_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(ex) {
    var rec = ex.record || {};
    return fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ blocked: blocked, bookings: Array.isArray(rec.bookings) ? rec.bookings : [] })
    });
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    setDateStatus('Salvato!', 'ok');
    setTimeout(function() { setDateStatus('',''); }, 2500);
  })
  .catch(function(e) { setDateStatus('Errore: ' + e.message, 'err'); });
}

function addDate() {
  var val = document.getElementById('new-date').value;
  var svc = document.getElementById('new-service').value;
  var err = document.getElementById('add-error');
  err.style.display = 'none';
  if (!val) { err.textContent = 'Seleziona una data.'; err.style.display = 'block'; return; }
  var parts = val.split('-');
  var day   = new Date(+parts[0], +parts[1]-1, +parts[2]).getDay();
  if (day === 1) { err.textContent = 'Il lunedì è già chiuso di default.'; err.style.display = 'block'; return; }
  if (day === 0 && svc === 'dinner') { err.textContent = 'La domenica è già chiusa a cena di default.'; err.style.display = 'block'; return; }
  if (blocked.find(function(b) { return b.date === val && b.service === svc; })) {
    err.textContent = 'Già bloccata.'; err.style.display = 'block'; return;
  }
  blocked.push({ date: val, service: svc });
  blocked.sort(function(a,b) { return a.date.localeCompare(b.date); });
  renderDates();
  saveBlocked();
  document.getElementById('new-date').value = '';
}

function removeDate(i) {
  blocked.splice(i, 1);
  renderDates();
  saveBlocked();
}

function renderDates() {
  var el = document.getElementById('date-list');
  if (blocked.length === 0) { el.innerHTML = '<p class="empty-msg">Nessuna data bloccata.</p>'; return; }
  el.innerHTML = blocked.map(function(b, i) {
    var p = b.date.split('-');
    var label = new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    label = label.charAt(0).toUpperCase() + label.slice(1);
    return '<div class="date-item"><span>' + label + ' — <em>' + (SVC[b.service]||b.service) + '</em></span>'
      + '<button class="btn-remove" onclick="removeDate(' + i + ')">✕</button></div>';
  }).join('');
}

function renderBookings() {
  var el    = document.getElementById('booking-list');
  var count = document.getElementById('booking-count');
  var sorted = bookings.slice().sort(function(a,b) { return new Date(b.timestamp||0) - new Date(a.timestamp||0); });
  count.textContent = sorted.length;
  if (sorted.length === 0) { el.innerHTML = '<p class="empty-msg">Nessuna prenotazione ancora.</p>'; return; }
  el.innerHTML = sorted.map(function(b) {
    var p = (b.data||'').split('-');
    var ds = b.data ? new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short',year:'numeric'}) : '—';
    var when = b.timestamp ? new Date(b.timestamp).toLocaleString('it-IT',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    return '<div class="booking-item">'
      + '<div class="b-name">' + esc(b.nome||'—') + '<span class="b-tag">' + esc(b.persone||'?') + ' pers.</span></div>'
      + '<div class="b-grid">'
      + '<div class="b-meta">📅 <strong>' + ds + '</strong> alle <strong>' + esc(b.orario||'—') + '</strong></div>'
      + '<div class="b-meta">✉️ ' + esc(b.email||'—') + '</div>'
      + '<div class="b-meta">📞 ' + esc(b.telefono||'—') + '</div>'
      + (when ? '<div class="b-time">Ricevuta: ' + when + '</div>' : '')
      + '</div></div>';
  }).join('');
}

function setDateStatus(msg, cls) {
  var el = document.getElementById('date-status');
  el.textContent = msg; el.className = 'status-bar ' + cls;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Carica subito
loadAll();
</script>
</body>
</html>
